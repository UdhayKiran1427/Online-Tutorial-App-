<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Online Tutorial Platform</title>
    <link rel="stylesheet" href="../public/css/style.css">
</head>
<body>
    <header>
        <nav class="container">
            <a href="/" class="logo">📚 Gradious Tutorial Platform</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="courses.html">Courses</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="container">
            <div class="form-container">
                <h2>Create Your Account</h2>
                <form id="registerForm">
                    <div class="form-group">
                        <label for="fullName">Full Name</label>
                        <input type="text" id="fullName" name="fullName" required placeholder="Enter your full name">
                    </div>
                    
                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    
                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="Confirm your password">
                    </div>
                    
                    <div class="form-group">
                        <label for="role">Register As</label>
                        <select id="role" name="role" required>
                            <option value="">Select Role</option>
                            <option value="student">Student</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>
                    
                    <div class="form-group" id="adminCodeGroup" style="display: none;">
                        <label for="adminCode">Admin Code</label>
                        <input type="text" id="adminCode" name="adminCode" placeholder="Enter admin authorization code">
                    </div>
                    
                    <button type="submit" class="btn">Register</button>
                    
                    <p style="margin-top: 1rem; text-align: center;">
                        Already have an account? <a href="login.html">Login here</a>
                    </p>
                </form>
            </div>
        </section>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2024 Online Tutorial Platform. All rights reserved.</p>
        </div>
    </footer>

    <script src="/public/js/main.js"></script>
    <script src="/public/js/register.js"></script>
</body>
</html>
